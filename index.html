<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram WebApp - Геолокация</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--tg-theme-hint-color, #999);
            border-top-color: var(--tg-theme-button-color, #2481cc);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading-text {
            font-size: 16px;
            color: var(--tg-theme-text-color, #000);
        }
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #info-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            border-top: 1px solid var(--tg-theme-hint-color, #ddd);
            padding: 16px;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 40vh;
            overflow-y: auto;
        }
        #info-panel.visible {
            transform: translateY(0);
        }
        .info-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #000);
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--tg-theme-hint-color, #eee);
            font-size: 14px;
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-label {
            color: var(--tg-theme-hint-color, #666);
        }
        .info-value {
            font-weight: 500;
            color: var(--tg-theme-text-color, #000);
        }
        .close-btn {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 24px;
            color: var(--tg-theme-hint-color, #999);
            cursor: pointer;
            padding: 4px;
        }
        .legend {
            position: fixed;
            top: 12px;
            right: 12px;
            background: var(--tg-theme-bg-color, #fff);
            padding: 10px 14px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            z-index: 100;
            font-size: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .legend-item:last-child {
            margin-bottom: 0;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        .legend-dot.user {
            background: #2481cc;
        }
        .legend-dot.point {
            background: #e74c3c;
        }
        .error-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 24px;
            text-align: center;
        }
        .error-screen.visible {
            display: flex;
        }
        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .error-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .error-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #666);
            margin-bottom: 24px;
            line-height: 1.5;
        }
        .retry-btn {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            padding: 12px 32px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Запрашиваем геолокацию...</div>
    </div>

    <div id="error-screen" class="error-screen">
        <div class="error-icon">📍</div>
        <div class="error-title">Геолокация недоступна</div>
        <div class="error-text" id="error-text">Не удалось получить ваше местоположение. Пожалуйста, разрешите доступ к геолокации и попробуйте снова.</div>
        <button class="retry-btn" onclick="initApp()">Попробовать снова</button>
    </div>

    <div id="map"></div>

    <div class="legend">
        <div class="legend-item">
            <div class="legend-dot user"></div>
            <span>Вы здесь</span>
        </div>
        <div class="legend-item">
            <div class="legend-dot point"></div>
            <span>Точки (3 шт)</span>
        </div>
    </div>

    <div id="info-panel">
        <button class="close-btn" onclick="closeInfoPanel()">×</button>
        <div class="info-title">📍 Информация о точке</div>
        <div class="info-row">
            <span class="info-label">Расстояние:</span>
            <span class="info-value" id="info-distance">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Широта:</span>
            <span class="info-value" id="info-lat">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Долгота:</span>
            <span class="info-value" id="info-lng">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Номер точки:</span>
            <span class="info-value" id="info-index">-</span>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Константы
        const MIN_DISTANCE = 700;   // метры
        const MAX_DISTANCE = 3000;  // метры
        const POINTS_COUNT = 3;
        const STORAGE_KEY = 'tg_webapp_points';

        let map = null;
        let userMarker = null;
        let pointMarkers = [];
        let userLocation = null;
        let points = [];

        // Функция для вычисления расстояния между двумя точками (формула гаверсинусов)
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000; // радиус Земли в метрах
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        // Генерация случайной точки в заданном радиусе
        function generateRandomPoint(centerLat, centerLng, minDist, maxDist) {
            // Случайное расстояние в метрах
            const distance = minDist + Math.random() * (maxDist - minDist);
            // Случайный угол в радианах
            const angle = Math.random() * 2 * Math.PI;

            // Переводим расстояние в градусы (приближённо)
            const latOffset = (distance * Math.cos(angle)) / 111320;
            const lngOffset = (distance * Math.sin(angle)) / (111320 * Math.cos(centerLat * Math.PI / 180));

            return {
                lat: centerLat + latOffset,
                lng: centerLng + lngOffset,
                distance: distance
            };
        }

        // Генерация 3 точек с проверкой минимального расстояния между ними
        function generatePoints(centerLat, centerLng) {
            const generated = [];
            let attempts = 0;
            const maxAttempts = 1000;

            while (generated.length < POINTS_COUNT && attempts < maxAttempts) {
                const point = generateRandomPoint(centerLat, centerLng, MIN_DISTANCE, MAX_DISTANCE);

                // Проверяем, что новая точка не слишком близко к уже созданным
                let tooClose = false;
                for (const existing of generated) {
                    const dist = getDistance(point.lat, point.lng, existing.lat, existing.lng);
                    if (dist < 200) { // минимум 200м между точками
                        tooClose = true;
                        break;
                    }
                }

                if (!tooClose) {
                    generated.push(point);
                }
                attempts++;
            }

            return generated;
        }

        // Сохранение точек в localStorage
        function savePoints(points) {
            const data = {
                points: points,
                timestamp: Date.now()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        }

        // Загрузка точек из localStorage
        function loadPoints() {
            try {
                const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (data && data.points && data.points.length === POINTS_COUNT) {
                    return data.points;
                }
            } catch (e) {
                console.error('Ошибка чтения localStorage:', e);
            }
            return null;
        }

        // Очистка сохранённых точек (для отладки)
        function clearSavedPoints() {
            localStorage.removeItem(STORAGE_KEY);
        }

        // Инициализация карты
        function initMap(lat, lng) {
            userLocation = { lat, lng };

            // Создаём карту
            map = L.map('map', {
                zoomControl: false
            }).setView([lat, lng], 14);

            // Добавляем тайлы OpenStreetMap
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors',
                maxZoom: 19
            }).addTo(map);

            // Маркер пользователя
            const userIcon = L.divIcon({
                className: 'user-marker',
                html: `<div style="
                    width: 20px; 
                    height: 20px; 
                    background: #2481cc; 
                    border: 3px solid white; 
                    border-radius: 50%; 
                    box-shadow: 0 2px 8px rgba(36,129,204,0.5);
                "></div>`,
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            userMarker = L.marker([lat, lng], { icon: userIcon }).addTo(map);
            userMarker.bindPopup('<b>Вы здесь</b>').openPopup();

            // Круг радиуса 3км
            L.circle([lat, lng], {
                radius: MAX_DISTANCE,
                color: '#2481cc',
                fillColor: '#2481cc',
                fillOpacity: 0.05,
                weight: 1,
                dashArray: '5, 10'
            }).addTo(map);

            // Круг радиуса 700м (запретная зона)
            L.circle([lat, lng], {
                radius: MIN_DISTANCE,
                color: '#e74c3c',
                fillColor: '#e74c3c',
                fillOpacity: 0.08,
                weight: 1,
                dashArray: '5, 5'
            }).addTo(map);

            // Загружаем или генерируем точки
            const saved = loadPoints();
            if (saved) {
                points = saved;
            } else {
                points = generatePoints(lat, lng);
                savePoints(points);
            }

            // Отображаем точки
            const pointIcon = L.divIcon({
                className: 'point-marker',
                html: `<div style="
                    width: 28px; 
                    height: 28px; 
                    background: #e74c3c; 
                    border: 3px solid white; 
                    border-radius: 50%; 
                    box-shadow: 0 2px 8px rgba(231,76,60,0.5);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    color: white;
                    font-weight: bold;
                    font-size: 12px;
                ">${index + 1}</div>`,
                iconSize: [28, 28],
                iconAnchor: [14, 14]
            });

            points.forEach((point, index) => {
                const marker = L.marker([point.lat, point.lng], {
                    icon: L.divIcon({
                        className: 'point-marker',
                        html: `<div style="
                            width: 32px; 
                            height: 32px; 
                            background: #e74c3c; 
                            border: 3px solid white; 
                            border-radius: 50%; 
                            box-shadow: 0 2px 10px rgba(231,76,60,0.6);
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            color: white;
                            font-weight: bold;
                            font-size: 14px;
                            font-family: sans-serif;
                        ">${index + 1}</div>`,
                        iconSize: [32, 32],
                        iconAnchor: [16, 16]
                    })
                }).addTo(map);

                marker.on('click', () => showPointInfo(point, index));
                pointMarkers.push(marker);
            });

            // Подгоняем карту, чтобы всё было видно
            const group = new L.featureGroup([userMarker, ...pointMarkers]);
            map.fitBounds(group.getBounds().pad(0.2));
        }

        // Показать информацию о точке
        function showPointInfo(point, index) {
            const dist = getDistance(userLocation.lat, userLocation.lng, point.lat, point.lng);

            document.getElementById('info-distance').textContent = dist < 1000 
                ? Math.round(dist) + ' м' 
                : (dist / 1000).toFixed(2) + ' км';
            document.getElementById('info-lat').textContent = point.lat.toFixed(6);
            document.getElementById('info-lng').textContent = point.lng.toFixed(6);
            document.getElementById('info-index').textContent = '#' + (index + 1);

            document.getElementById('info-panel').classList.add('visible');
        }

        // Закрыть панель информации
        function closeInfoPanel() {
            document.getElementById('info-panel').classList.remove('visible');
        }

        // Показать ошибку
        function showError(message) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error-text').textContent = message;
            document.getElementById('error-screen').classList.add('visible');
        }

        // Скрыть ошибку
        function hideError() {
            document.getElementById('error-screen').classList.remove('visible');
        }

        // Основная функция инициализации
        function initApp() {
            hideError();
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('loading-text').textContent = 'Запрашиваем геолокацию...';

            // Пробуем получить геолокацию через Telegram WebApp API
            if (tg.platform !== 'unknown' && tg.initDataUnsafe && tg.initDataUnsafe.user) {
                // Используем нативный API Telegram
                tg.LocationManager.getLocation((location) => {
                    if (location) {
                        document.getElementById('loading').classList.add('hidden');
                        initMap(location.latitude, location.longitude);
                    } else {
                        // Fallback на браузерный geolocation
                        requestBrowserLocation();
                    }
                });
            } else {
                // Fallback на браузерный geolocation
                requestBrowserLocation();
            }
        }

        // Запрос геолокации через браузер
        function requestBrowserLocation() {
            if (!navigator.geolocation) {
                showError('Геолокация не поддерживается вашим устройством.');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('loading').classList.add('hidden');
                    initMap(position.coords.latitude, position.coords.longitude);
                },
                (error) => {
                    let msg = 'Не удалось получить ваше местоположение.';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            msg = 'Доступ к геолокации запрещён. Пожалуйста, разрешите доступ в настройках браузера.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = 'Информация о местоположении недоступна.';
                            break;
                        case error.TIMEOUT:
                            msg = 'Превышено время ожидания геолокации.';
                            break;
                    }
                    showError(msg);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        // Запускаем приложение при загрузке
        document.addEventListener('DOMContentLoaded', initApp);

        // Обработка изменения темы Telegram
        tg.onEvent('themeChanged', () => {
            // Перезагружаем стили при смене темы
            document.body.style.background = tg.themeParams.bg_color || '#ffffff';
        });
    </script>
</body>
</html>
