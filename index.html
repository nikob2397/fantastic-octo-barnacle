<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geo Map App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #loading-screen p {
            color: #aaa;
            font-size: 16px;
        }

        #map-container {
            flex: 1;
            position: relative;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #map {
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 600px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        .leaflet-container {
            background: #0a0a1a !important;
        }

        #info-panel {
            position: fixed;
            bottom: -200px;
            left: 0;
            right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px 20px 0 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            transition: bottom 0.3s ease;
            z-index: 500;
        }

        #info-panel.active {
            bottom: 0;
        }

        #info-panel h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 18px;
        }

        #info-panel p {
            color: #ccc;
            margin: 5px 0;
            font-size: 14px;
        }

        #info-panel .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
        }

        .user-marker {
            background: #00d4ff;
            border: 3px solid #fff;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            box-shadow: 0 0 10px rgba(0,212,255,0.5);
        }

        .user-marker::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            border: 2px solid rgba(0,212,255,0.3);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
        }

        .point-marker {
            background: #ff6b6b;
            border: 2px solid #fff;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            box-shadow: 0 0 15px rgba(255,107,107,0.5);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .point-marker:hover {
            transform: scale(1.2);
        }

        #error-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            padding: 20px;
            text-align: center;
        }

        #error-screen h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
        }

        #error-screen p {
            color: #aaa;
            margin-bottom: 20px;
        }

        .retry-btn {
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #00a8cc;
        }

        .distance-badge {
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <p>Запрашиваем геолокацию...</p>
    </div>

    <div id="error-screen">
        <h2>⚠️ Ошибка доступа</h2>
        <p id="error-message">Не удалось получить геолокацию</p>
        <button class="retry-btn" onclick="requestLocation()">Повторить</button>
    </div>

    <div id="map-container">
        <div id="map"></div>
    </div>

    <div id="info-panel">
        <button class="close-btn" onclick="closeInfoPanel()">×</button>
        <h3>📍 Точка <span id="point-number"></span></h3>
        <p><strong>Расстояние:</strong> <span id="point-distance"></span></p>
        <p><strong>Широта:</strong> <span id="point-lat"></span></p>
        <p><strong>Долгота:</strong> <span id="point-lng"></span></p>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let map;
        let userLat, userLng;
        let randomPoints = [];
        let markers = [];
        let mapBounds;

        // Константы
        const MAP_SIZE_KM = 6; // 6x6 км (3 км в каждую сторону)
        const POINT_MIN_DIST_KM = 0.7; // минимум 700м
        const POINT_MAX_DIST_KM = 2.5; // максимум 2.5км
        const NUM_POINTS = 3;

        // Инициализация
        document.addEventListener('DOMContentLoaded', function() {
            requestLocation();
        });

        function requestLocation() {
            document.getElementById('loading-screen').style.display = 'flex';
            document.getElementById('error-screen').style.display = 'none';

            if (!navigator.geolocation) {
                showError('Геолокация не поддерживается вашим устройством');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                onLocationSuccess,
                onLocationError,
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        function onLocationSuccess(position) {
            userLat = position.coords.latitude;
            userLng = position.coords.longitude;

            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loading-screen').style.display = 'none';
            }, 500);

            initMap();
        }

        function onLocationError(error) {
            let message = 'Не удалось получить геолокацию';
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    message = 'Доступ к геолокации запрещён. Пожалуйста, разрешите доступ в настройках.';
                    break;
                case error.POSITION_UNAVAILABLE:
                    message = 'Информация о местоположении недоступна.';
                    break;
                case error.TIMEOUT:
                    message = 'Время ожидания геолокации истекло.';
                    break;
            }
            showError(message);
        }

        function showError(message) {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
            document.getElementById('error-message').textContent = message;
        }

        function initMap() {
            // Вычисляем границы карты (6x6 км)
            mapBounds = getBoundsFromCenter(userLat, userLng, MAP_SIZE_KM);

            // Создаём карту — полностью статичная, без взаимодействия
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false,
                dragging: false,
                touchZoom: false,
                scrollWheelZoom: false,
                doubleClickZoom: false,
                boxZoom: false,
                keyboard: false,
                tap: false,
                maxBounds: mapBounds,
                maxBoundsViscosity: 1.0,
                zoomSnap: 0
            });

            // Спутниковая подложка (Esri World Imagery)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'Esri',
                bounds: mapBounds // TileLayer тоже ограничиваем границами
            }).addTo(map);

            // Добавляем подписи
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'Esri',
                bounds: mapBounds
            }).addTo(map);

            // Маркер пользователя
            const userIcon = L.divIcon({
                className: 'user-marker',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });

            L.marker([userLat, userLng], { icon: userIcon }).addTo(map);

            // Устанавливаем вид ровно на границы карты
            map.fitBounds(mapBounds, { padding: [0, 0], animate: false });

            // Фиксируем zoom — запрещаем любое изменение
            const fixedZoom = map.getZoom();
            map.setMinZoom(fixedZoom);
            map.setMaxZoom(fixedZoom);

            // Дополнительная защита: принудительно возвращаем вид при любых попытках сдвинуть
            map.on('move', function() {
                map.fitBounds(mapBounds, { padding: [0, 0], animate: false });
            });

            // Загружаем или создаём точки
            loadOrCreatePoints();
        }

        function getBoundsFromCenter(lat, lng, sizeKm) {
            // Приблизительно: 1 град широты ~ 111 км
            // 1 град долготы ~ 111 * cos(широта) км
            const latDelta = sizeKm / 2 / 111;
            const lngDelta = sizeKm / 2 / (111 * Math.cos(lat * Math.PI / 180));

            return L.latLngBounds(
                [lat - latDelta, lng - lngDelta],
                [lat + latDelta, lng + lngDelta]
            );
        }

        function loadOrCreatePoints() {
            const saved = localStorage.getItem('randomPoints');
            const savedCenter = localStorage.getItem('centerLocation');

            // Проверяем, есть ли сохранённые точки и совпадает ли центр (с точностью ~100м)
            if (saved && savedCenter) {
                const center = JSON.parse(savedCenter);
                const dist = getDistance(userLat, userLng, center.lat, center.lng);

                if (dist < 0.1) { // менее 100м от предыдущей позиции
                    randomPoints = JSON.parse(saved);
                    displayPoints();
                    return;
                }
            }

            // Создаём новые точки
            createRandomPoints();
        }

        function createRandomPoints() {
            randomPoints = [];
            let attempts = 0;
            const maxAttempts = 1000;

            while (randomPoints.length < NUM_POINTS && attempts < maxAttempts) {
                attempts++;

                // Случайное расстояние между min и max
                const dist = POINT_MIN_DIST_KM + Math.random() * (POINT_MAX_DIST_KM - POINT_MIN_DIST_KM);
                // Случайный угол
                const angle = Math.random() * 2 * Math.PI;

                // Переводим в координаты
                const point = getPointAtDistance(userLat, userLng, dist, angle);

                // Проверяем, что точка в пределах карты (3 км от центра = 6x6)
                const distFromCenter = getDistance(userLat, userLng, point.lat, point.lng);
                if (distFromCenter > MAP_SIZE_KM / 2) continue;

                // Проверяем минимальное расстояние между точками
                let tooClose = false;
                for (let p of randomPoints) {
                    if (getDistance(p.lat, p.lng, point.lat, point.lng) < 0.3) { // мин 300м между точками
                        tooClose = true;
                        break;
                    }
                }
                if (tooClose) continue;

                randomPoints.push({
                    lat: point.lat,
                    lng: point.lng,
                    id: randomPoints.length + 1
                });
            }

            // Сохраняем
            localStorage.setItem('randomPoints', JSON.stringify(randomPoints));
            localStorage.setItem('centerLocation', JSON.stringify({ lat: userLat, lng: userLng }));

            displayPoints();
        }

        function getPointAtDistance(lat, lng, distKm, angleRad) {
            // Переводим расстояние в градусы (приблизительно)
            const R = 6371; // радиус Земли в км
            const latRad = lat * Math.PI / 180;
            const lngRad = lng * Math.PI / 180;

            const newLatRad = Math.asin(
                Math.sin(latRad) * Math.cos(distKm / R) +
                Math.cos(latRad) * Math.sin(distKm / R) * Math.cos(angleRad)
            );

            const newLngRad = lngRad + Math.atan2(
                Math.sin(angleRad) * Math.sin(distKm / R) * Math.cos(latRad),
                Math.cos(distKm / R) - Math.sin(latRad) * Math.sin(newLatRad)
            );

            return {
                lat: newLatRad * 180 / Math.PI,
                lng: newLngRad * 180 / Math.PI
            };
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function displayPoints() {
            // Очищаем старые маркеры
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            randomPoints.forEach((point, index) => {
                const dist = getDistance(userLat, userLng, point.lat, point.lng);

                const pointIcon = L.divIcon({
                    className: 'point-marker',
                    html: (index + 1).toString(),
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });

                const marker = L.marker([point.lat, point.lng], { icon: pointIcon })
                    .addTo(map)
                    .on('click', () => showPointInfo(point, dist));

                markers.push(marker);

                // Подпись с расстоянием
                const distLabel = L.divIcon({
                    className: 'distance-badge',
                    html: dist.toFixed(2) + ' км',
                    iconSize: [80, 20],
                    iconAnchor: [40, -15]
                });

                const labelMarker = L.marker([point.lat, point.lng], { icon: distLabel, interactive: false })
                    .addTo(map);
                markers.push(labelMarker);
            });
        }

        function showPointInfo(point, dist) {
            document.getElementById('point-number').textContent = point.id;
            document.getElementById('point-distance').textContent = dist.toFixed(3) + ' км';
            document.getElementById('point-lat').textContent = point.lat.toFixed(6);
            document.getElementById('point-lng').textContent = point.lng.toFixed(6);
            document.getElementById('info-panel').classList.add('active');
        }

        function closeInfoPanel() {
            document.getElementById('info-panel').classList.remove('active');
        }
    </script>
</body>
</html>
