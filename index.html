<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Satellite Map</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #333;
            border-top-color: #0088cc;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #fff;
            font-size: 16px;
            text-align: center;
            padding: 0 20px;
        }

        .loading-subtext {
            color: #888;
            font-size: 13px;
            margin-top: 8px;
        }

        #map-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            padding: 10px;
        }

        #map-wrapper {
            width: 100%;
            max-width: 600px;
            aspect-ratio: 1;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
        }

        .user-marker {
            width: 20px !important;
            height: 20px !important;
            background: #0088cc;
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 0 4px rgba(0, 136, 204, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 4px rgba(0, 136, 204, 0.3); }
            50% { box-shadow: 0 0 0 12px rgba(0, 136, 204, 0.1); }
        }

        .random-marker {
            width: 16px !important;
            height: 16px !important;
            background: #ff6b6b;
            border: 2px solid #fff;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .random-marker:hover {
            transform: scale(1.2);
        }

        #point-info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(120%);
            background: rgba(30, 30, 30, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 16px 20px;
            min-width: 280px;
            max-width: 90vw;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        #point-info.visible {
            transform: translateX(-50%) translateY(0);
        }

        .info-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .info-title {
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-dot {
            width: 10px;
            height: 10px;
            background: #ff6b6b;
            border-radius: 50%;
        }

        .info-close {
            color: #888;
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            padding: 4px;
        }

        .info-close:hover {
            color: #fff;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #888;
            font-size: 13px;
        }

        .info-value {
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            font-family: 'SF Mono', monospace;
        }

        .distance-value {
            color: #4ecdc4;
            font-size: 18px;
            font-weight: 700;
        }

        #error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            padding: 20px;
        }

        #error-screen.visible {
            display: flex;
        }

        .error-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .error-title {
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }

        .error-desc {
            color: #888;
            font-size: 14px;
            text-align: center;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .retry-btn {
            background: #0088cc;
            color: #fff;
            border: none;
            padding: 12px 32px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .retry-btn:hover {
            background: #0099e6;
        }

        .leaflet-control-attribution {
            font-size: 9px !important;
        }

        .leaflet-control-zoom {
            border-radius: 8px !important;
            overflow: hidden;
        }

        .leaflet-control-zoom a {
            background: rgba(30,30,30,0.9) !important;
            color: #fff !important;
            border-color: rgba(255,255,255,0.1) !important;
        }

        .leaflet-control-zoom a:hover {
            background: rgba(50,50,50,0.9) !important;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text">Запрашиваем геолокацию...</div>
        <div class="loading-subtext">Пожалуйста, разрешите доступ к местоположению</div>
    </div>

    <div id="error-screen">
        <div class="error-icon">📍</div>
        <div class="error-title">Не удалось получить геолокацию</div>
        <div class="error-desc" id="error-desc">Проверьте настройки разрешений и попробуйте снова</div>
        <button class="retry-btn" onclick="initApp()">Попробовать снова</button>
    </div>

    <div id="map-container">
        <div id="map-wrapper">
            <div id="map"></div>
        </div>
    </div>

    <div id="point-info">
        <div class="info-header">
            <div class="info-title">
                <div class="info-dot"></div>
                Точка <span id="point-number">1</span>
            </div>
            <div class="info-close" onclick="closeInfo()">&times;</div>
        </div>
        <div class="info-row">
            <span class="info-label">Расстояние</span>
            <span class="info-value distance-value" id="info-distance">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Широта</span>
            <span class="info-value" id="info-lat">—</span>
        </div>
        <div class="info-row">
            <span class="info-label">Долгота</span>
            <span class="info-value" id="info-lng">—</span>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let map = null;
        let userLat = null;
        let userLng = null;
        let randomPoints = [];
        let mapMarkers = [];

        // Earth radius in meters
        const EARTH_RADIUS = 6371000;

        function toRad(deg) {
            return deg * Math.PI / 180;
        }

        function toDeg(rad) {
            return rad * 180 / Math.PI;
        }

        // Haversine distance in meters
        function getDistance(lat1, lng1, lat2, lng2) {
            const dLat = toRad(lat2 - lat1);
            const dLng = toRad(lng2 - lng1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return EARTH_RADIUS * c;
        }

        // Generate random point within annulus (minDist, maxDist) from center
        function generateRandomPoint(centerLat, centerLng, minDist, maxDist) {
            // Random angle
            const angle = Math.random() * 2 * Math.PI;
            // Random distance (uniform distribution in annulus)
            const dist = Math.sqrt(
                Math.random() * (maxDist*maxDist - minDist*minDist) + minDist*minDist
            );

            // Convert to lat/lng offset
            const latOffset = (dist / EARTH_RADIUS) * (180 / Math.PI);
            const lngOffset = latOffset / Math.cos(toRad(centerLat));

            const lat = centerLat + latOffset * Math.cos(angle);
            const lng = centerLng + lngOffset * Math.sin(angle);

            return { lat, lng };
        }

        // Load or generate random points
        function loadOrGeneratePoints() {
            const saved = localStorage.getItem('random_points');
            const savedLat = localStorage.getItem('user_lat');
            const savedLng = localStorage.getItem('user_lng');

            // Check if we have saved points for this location (within 100m tolerance)
            if (saved && savedLat && savedLng) {
                const dist = getDistance(userLat, userLng, parseFloat(savedLat), parseFloat(savedLng));
                if (dist < 100) {
                    randomPoints = JSON.parse(saved);
                    return;
                }
            }

            // Generate new points
            randomPoints = [];
            for (let i = 0; i < 3; i++) {
                randomPoints.push(generateRandomPoint(userLat, userLng, 700, 2500));
            }

            // Save to localStorage
            localStorage.setItem('random_points', JSON.stringify(randomPoints));
            localStorage.setItem('user_lat', userLat.toString());
            localStorage.setItem('user_lng', userLng.toString());
        }

        function showPointInfo(index, point) {
            const dist = getDistance(userLat, userLng, point.lat, point.lng);

            document.getElementById('point-number').textContent = index + 1;
            document.getElementById('info-distance').textContent = dist < 1000 
                ? Math.round(dist) + ' м' 
                : (dist / 1000).toFixed(2) + ' км';
            document.getElementById('info-lat').textContent = point.lat.toFixed(6);
            document.getElementById('info-lng').textContent = point.lng.toFixed(6);

            document.getElementById('point-info').classList.add('visible');
        }

        function closeInfo() {
            document.getElementById('point-info').classList.remove('visible');
        }

        function initMap() {
            // Calculate bounds for 6km x 6km square (3km radius)
            const latOffset = (3000 / EARTH_RADIUS) * (180 / Math.PI);
            const lngOffset = latOffset / Math.cos(toRad(userLat));

            const southWest = [userLat - latOffset, userLng - lngOffset];
            const northEast = [userLat + latOffset, userLng + lngOffset];
            const bounds = L.latLngBounds(southWest, northEast);

            // Create map
            map = L.map('map', {
                center: [userLat, userLng],
                zoom: 14,
                maxBounds: bounds,
                maxBoundsViscosity: 1.0,
                minZoom: 13,
                maxZoom: 18,
                attributionControl: true
            });

            // Add satellite tile layer (Esri)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: '&copy; Esri',
                maxZoom: 18
            }).addTo(map);

            // Fit to our 6km bounds
            map.fitBounds(bounds, { padding: [0, 0], animate: false });

            // Add user location marker
            const userIcon = L.divIcon({
                className: 'user-marker',
                iconSize: [20, 20],
                iconAnchor: [10, 10]
            });
            L.marker([userLat, userLng], { icon: userIcon, zIndexOffset: 1000 }).addTo(map);

            // Load/generate random points
            loadOrGeneratePoints();

            // Add random point markers
            const randomIcon = L.divIcon({
                className: 'random-marker',
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            randomPoints.forEach((point, index) => {
                const marker = L.marker([point.lat, point.lng], { icon: randomIcon })
                    .addTo(map)
                    .on('click', () => showPointInfo(index, point));
                mapMarkers.push(marker);
            });

            // Hide loading, show map
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('error-screen').classList.remove('visible');
        }

        function showError(message) {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('error-desc').textContent = message;
            document.getElementById('error-screen').classList.add('visible');
        }

        function initApp() {
            document.getElementById('loading-screen').classList.remove('hidden');
            document.getElementById('error-screen').classList.remove('visible');

            if (!navigator.geolocation) {
                showError('Геолокация не поддерживается вашим устройством');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    userLat = position.coords.latitude;
                    userLng = position.coords.longitude;
                    initMap();
                },
                (error) => {
                    let msg = 'Не удалось определить местоположение';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            msg = 'Доступ к геолокации запрещён. Проверьте настройки браузера.';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = 'Информация о местоположении недоступна.';
                            break;
                        case error.TIMEOUT:
                            msg = 'Превышено время ожидания геолокации.';
                            break;
                    }
                    showError(msg);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        }

        // Start
        initApp();

        // Close info on map click
        document.getElementById('map').addEventListener('click', (e) => {
            if (e.target.id === 'map' || e.target.classList.contains('leaflet-container')) {
                closeInfo();
            }
        });
    </script>
</body>
</html>
