<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geo Cash DEBUG</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1c1c1e; color: white; height: 100vh; overflow: hidden; }

        #debug-log {
            position: fixed; top: 0; left: 0; right: 0; bottom: 50%;
            background: #000; color: #0f0; font-family: monospace; font-size: 12px;
            padding: 10px; overflow-y: auto; z-index: 9999; white-space: pre-wrap;
            border-bottom: 2px solid #333;
        }
        #debug-log .err { color: #f33; }
        #debug-log .info { color: #ff0; }

        #map { position: fixed; top: 50%; left: 0; right: 0; bottom: 0; z-index: 1; }

        .btn {
            position: fixed; bottom: 10px; left: 10px; z-index: 100;
            background: #0a84ff; color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-size: 14px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="debug-log">Загрузка...</div>
    <div id="map"></div>
    <button class="btn" onclick="location.reload()">🔄 Перезагрузить</button>

    <script>
        const logEl = document.getElementById('debug-log');
        function log(msg, isErr) {
            const line = document.createElement('div');
            line.textContent = '> ' + msg;
            if (isErr) line.className = 'err';
            else line.className = 'info';
            logEl.appendChild(line);
            logEl.scrollTop = logEl.scrollHeight;
        }

        const MIN_DIST = 700, MAX_DIST = 3000, POINTS_COUNT = 3;
        const STORAGE_KEY = 'geo_cash_debug';

        log('=== DEBUG MODE ===');
        log('UserAgent: ' + navigator.userAgent);
        log('Protocol: ' + location.protocol);
        log('Telegram object: ' + (window.Telegram ? 'YES' : 'NO'));

        if (window.Telegram && window.Telegram.WebApp) {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            log('TG version: ' + tg.version);
            log('TG platform: ' + tg.platform);
            log('LocationManager: ' + (tg.LocationManager ? 'YES' : 'NO'));
        }

        log('Geolocation API: ' + (navigator.geolocation ? 'YES' : 'NO'));

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function generatePoint(centerLat, centerLng, minDist, maxDist) {
            const distance = minDist + Math.random() * (maxDist - minDist);
            const angle = Math.random() * 2 * Math.PI;
            const latOffset = (distance * Math.cos(angle)) / 111320;
            const lngOffset = (distance * Math.sin(angle)) / (111320 * Math.cos(centerLat * Math.PI / 180));
            return { lat: centerLat + latOffset, lng: centerLng + lngOffset };
        }

        function generatePoints(centerLat, centerLng) {
            const generated = [];
            let attempts = 0;
            while (generated.length < POINTS_COUNT && attempts < 2000) {
                const point = generatePoint(centerLat, centerLng, MIN_DIST, MAX_DIST);
                let tooClose = false;
                for (const existing of generated) {
                    if (getDistance(point.lat, point.lng, existing.lat, existing.lng) < 200) {
                        tooClose = true; break;
                    }
                }
                if (!tooClose) generated.push(point);
                attempts++;
            }
            return generated;
        }

        function savePoints(pts) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ points: pts, timestamp: Date.now() }));
        }

        function loadPoints() {
            try {
                const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
                if (data && data.points && data.points.length === POINTS_COUNT) return data.points;
            } catch (e) {}
            return null;
        }

        function initMap(lat, lng, accuracy) {
            log('Init map at ' + lat.toFixed(6) + ', ' + lng.toFixed(6) + ' (acc: ' + (accuracy || '?') + ')');

            const map = L.map('map', { zoomControl: false }).setView([lat, lng], 14);

            // Satellite tiles
            const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri', maxZoom: 19
            }).addTo(map);

            // User marker
            const userIcon = L.divIcon({
                html: `<div style="width:24px;height:24px;background:#0a84ff;border:3px solid white;border-radius:50%;box-shadow:0 0 0 5px rgba(10,132,255,0.4);"></div>`,
                iconSize: [24, 24], iconAnchor: [12, 12]
            });
            L.marker([lat, lng], { icon: userIcon }).addTo(map).bindPopup('<b>Вы здесь</b>').openPopup();

            // Points
            let points = loadPoints();
            if (!points) {
                points = generatePoints(lat, lng);
                savePoints(points);
                log('Generated ' + points.length + ' new points');
            } else {
                log('Loaded ' + points.length + ' saved points');
            }

            points.forEach((p, i) => {
                const icon = L.divIcon({
                    html: `<div style="width:40px;height:40px;background:#ff3b30;border:3px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:16px;">${i+1}</div>`,
                    iconSize: [40, 40], iconAnchor: [20, 20]
                });
                const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
                const d = getDistance(lat, lng, p.lat, p.lng);
                m.bindPopup('Точка #' + (i+1) + '<br>Расстояние: ' + (d < 1000 ? Math.round(d) + ' м' : (d/1000).toFixed(2) + ' км') + '<br>Lat: ' + p.lat.toFixed(6) + '<br>Lng: ' + p.lng.toFixed(6));
            });

            const allMarkers = points.map(p => L.marker([p.lat, p.lng]));
            allMarkers.push(L.marker([lat, lng]));
            const group = L.featureGroup(allMarkers);
            map.fitBounds(group.getBounds().pad(0.2));

            log('Map ready!', false);
        }

        // Request location
        log('Requesting geolocation...');

        if (!navigator.geolocation) {
            log('ERROR: navigator.geolocation not available', true);
        } else {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    log('Location SUCCESS', false);
                    initMap(position.coords.latitude, position.coords.longitude, position.coords.accuracy);
                },
                (error) => {
                    let msg = 'Unknown error';
                    switch(error.code) {
                        case error.PERMISSION_DENIED: msg = 'PERMISSION_DENIED (code 1)'; break;
                        case error.POSITION_UNAVAILABLE: msg = 'POSITION_UNAVAILABLE (code 2)'; break;
                        case error.TIMEOUT: msg = 'TIMEOUT (code 3)'; break;
                    }
                    log('Location ERROR: ' + msg + ' - ' + (error.message || 'no message'), true);
                },
                { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
            );
        }
    </script>
</body>
</html>
