<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Geo Cash</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        :root {
            --bg: var(--tg-theme-bg-color, #1c1c1e);
            --text: var(--tg-theme-text-color, #ffffff);
            --hint: var(--tg-theme-hint-color, #8e8e93);
            --button: var(--tg-theme-button-color, #0a84ff);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
            --accent: #0a84ff;
            --danger: #ff3b30;
            --success: #34c759;
        }
        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* === SCREENS === */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            background: var(--bg);
            padding: 24px;
            text-align: center;
            transition: opacity 0.3s ease;
        }
        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        /* Loading */
        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid rgba(10, 132, 255, 0.15);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text {
            font-size: 17px;
            color: var(--text);
            font-weight: 400;
        }
        .loading-sub {
            font-size: 13px;
            color: var(--hint);
            margin-top: 8px;
        }

        /* Error */
        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text);
        }
        .error-desc {
            font-size: 15px;
            color: var(--hint);
            line-height: 1.5;
            margin-bottom: 32px;
            max-width: 320px;
        }
        .btn {
            background: var(--button);
            color: var(--button-text);
            border: none;
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 500;
            cursor: pointer;
            width: 100%;
            max-width: 280px;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }
        .btn-secondary {
            background: var(--secondary-bg);
            color: var(--text);
            margin-top: 12px;
        }

        /* Permission */
        .perm-icon {
            font-size: 72px;
            margin-bottom: 20px;
        }
        .perm-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }
        .perm-desc {
            font-size: 15px;
            color: var(--hint);
            line-height: 1.5;
            margin-bottom: 32px;
            max-width: 300px;
        }

        /* Map */
        #map-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            display: none;
        }
        #map-container.visible { display: block; }
        #map {
            width: 100%;
            height: 100%;
        }

        /* Bottom Sheet */
        .bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--secondary-bg);
            border-radius: 20px 20px 0 0;
            padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
            z-index: 200;
            transform: translateY(110%);
            transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
            max-height: 55vh;
        }
        .bottom-sheet.visible {
            transform: translateY(0);
        }
        .sheet-handle {
            width: 36px;
            height: 5px;
            background: var(--hint);
            border-radius: 3px;
            margin: 0 auto 16px;
            opacity: 0.4;
        }
        .sheet-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .sheet-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(142,142,147,0.2);
        }
        .sheet-row:last-child { border-bottom: none; }
        .sheet-label {
            font-size: 15px;
            color: var(--hint);
        }
        .sheet-value {
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            font-family: 'SF Mono', Monaco, monospace;
        }
        .sheet-value.distance {
            color: var(--accent);
            font-size: 18px;
            font-weight: 600;
        }
        .sheet-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: none;
            border: none;
            font-size: 28px;
            color: var(--hint);
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Legend */
        .legend {
            position: fixed;
            top: 12px;
            right: 12px;
            background: var(--secondary-bg);
            padding: 10px 14px;
            border-radius: 12px;
            z-index: 100;
            font-size: 12px;
            backdrop-filter: blur(10px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .legend-item:last-child { margin-bottom: 0; }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .legend-dot.user { background: var(--accent); }
        .legend-dot.point { background: var(--danger); }

        /* Debug panel */
        .debug-btn {
            position: fixed;
            bottom: 16px;
            left: 16px;
            z-index: 100;
            background: var(--secondary-bg);
            color: var(--hint);
            border: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            display: none;
        }
        .debug-btn.visible { display: block; }

        /* Leaflet overrides */
        .leaflet-container {
            background: #e5e3df !important;
        }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="screen-loading" class="screen">
        <div class="spinner"></div>
        <div class="loading-text">Запрашиваем геолокацию...</div>
        <div class="loading-sub" id="loading-sub">Подождите немного</div>
    </div>

    <!-- PERMISSION SCREEN -->
    <div id="screen-perm" class="screen hidden">
        <div class="perm-icon">📍</div>
        <div class="perm-title">Нужен доступ к геолокации</div>
        <div class="perm-desc">Для работы приложения необходимо разрешить доступ к вашему местоположению. Это нужно, чтобы показать точки рядом с вами.</div>
        <button class="btn" id="btn-request-loc">Разрешить доступ</button>
        <button class="btn btn-secondary" id="btn-use-browser">Использовать браузерный GPS</button>
    </div>

    <!-- ERROR SCREEN -->
    <div id="screen-error" class="screen hidden">
        <div class="error-icon">⚠️</div>
        <div class="error-title" id="error-title">Ошибка</div>
        <div class="error-desc" id="error-desc">Что-то пошло не так</div>
        <button class="btn" id="btn-retry">Попробовать снова</button>
        <button class="btn btn-secondary" id="btn-reset-points">Сбросить точки</button>
    </div>

    <!-- MAP -->
    <div id="map-container">
        <div id="map"></div>
        <div class="legend">
            <div class="legend-item">
                <div class="legend-dot user"></div>
                <span>Вы здесь</span>
            </div>
            <div class="legend-item">
                <div class="legend-dot point"></div>
                <span>Точки</span>
            </div>
        </div>
        <button class="debug-btn" id="btn-debug">🔄 Сбросить точки</button>
    </div>

    <!-- BOTTOM SHEET -->
    <div class="bottom-sheet" id="bottom-sheet">
        <button class="sheet-close" id="sheet-close">×</button>
        <div class="sheet-handle"></div>
        <div class="sheet-title">📍 Точка <span id="sheet-num">#1</span></div>
        <div class="sheet-row">
            <span class="sheet-label">Расстояние</span>
            <span class="sheet-value distance" id="sheet-dist">-</span>
        </div>
        <div class="sheet-row">
            <span class="sheet-label">Широта</span>
            <span class="sheet-value" id="sheet-lat">-</span>
        </div>
        <div class="sheet-row">
            <span class="sheet-label">Долгота</span>
            <span class="sheet-value" id="sheet-lng">-</span>
        </div>
        <div class="sheet-row">
            <span class="sheet-label">Точность</span>
            <span class="sheet-value" id="sheet-acc">-</span>
        </div>
    </div>

    <script>
        // ===================== CONSTANTS =====================
        const MIN_DIST = 700;
        const MAX_DIST = 3000;
        const POINTS_COUNT = 3;
        const STORAGE_KEY = 'geo_cash_points_v2';
        const USER_STORAGE_KEY = 'geo_cash_user_loc';

        // ===================== STATE =====================
        let tg = null;
        let map = null;
        let userLoc = null;
        let points = [];
        let markers = [];
        let useNativeLocation = true;

        // ===================== UTILS =====================
        function log(...args) {
            console.log('[GeoCash]', ...args);
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            const el = document.getElementById(id);
            if (el) el.classList.remove('hidden');
        }

        function setLoading(text, sub) {
            document.querySelector('.loading-text').textContent = text;
            document.getElementById('loading-sub').textContent = sub || '';
            showScreen('screen-loading');
        }

        function showError(title, desc) {
            document.getElementById('error-title').textContent = title;
            document.getElementById('error-desc').textContent = desc;
            showScreen('screen-error');
        }

        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatDist(m) {
            if (m < 1000) return Math.round(m) + ' м';
            return (m / 1000).toFixed(2) + ' км';
        }

        // ===================== STORAGE =====================
        function savePoints(pts) {
            const data = { points: pts, createdAt: Date.now() };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            log('Points saved');
        }

        function loadPoints() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) return null;
                const data = JSON.parse(raw);
                if (data && data.points && data.points.length === POINTS_COUNT) {
                    return data.points;
                }
            } catch (e) { log('Load error:', e); }
            return null;
        }

        function clearPoints() {
            localStorage.removeItem(STORAGE_KEY);
            localStorage.removeItem(USER_STORAGE_KEY);
            points = [];
            markers = [];
            log('Points cleared');
        }

        // ===================== POINT GENERATION =====================
        function generateRandomPoint(centerLat, centerLng, minD, maxD) {
            const dist = minD + Math.random() * (maxD - minD);
            const angle = Math.random() * 2 * Math.PI;
            const latOffset = (dist * Math.cos(angle)) / 111320;
            const lngOffset = (dist * Math.sin(angle)) / (111320 * Math.cos(centerLat * Math.PI / 180));
            return { lat: centerLat + latOffset, lng: centerLng + lngOffset, distance: dist };
        }

        function generatePoints(centerLat, centerLng) {
            const generated = [];
            let attempts = 0;
            while (generated.length < POINTS_COUNT && attempts < 2000) {
                const p = generateRandomPoint(centerLat, centerLng, MIN_DIST, MAX_DIST);
                let tooClose = false;
                for (const ex of generated) {
                    if (getDistance(p.lat, p.lng, ex.lat, ex.lng) < 200) { tooClose = true; break; }
                }
                if (!tooClose) generated.push(p);
                attempts++;
            }
            return generated;
        }

        // ===================== MAP =====================
        function initMap(lat, lng, accuracy) {
            userLoc = { lat, lng, accuracy };
            localStorage.setItem(USER_STORAGE_KEY, JSON.stringify(userLoc));

            document.getElementById('map-container').classList.add('visible');

            // Светлая карта + наклон как в навигаторе
            map = L.map('map', {
                zoomControl: false,
                rotate: true
            }).setView([lat, lng], 15);

            // Устанавливаем наклон (tilt) и поворот как в навигаторе
            // Leaflet не поддерживает 3D tilt из коробки, но можно через CSS transform
            // Добавляем перспективу через CSS
            const mapPane = document.querySelector('.leaflet-map-pane');
            if (mapPane) {
                mapPane.style.transform = 'perspective(1000px) rotateX(35deg) scale(1.1)';
                mapPane.style.transformOrigin = 'center center';
            }

            // Светлые тайлы (стандартные OSM — светлые)
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap',
                maxZoom: 19
            }).addTo(map);

            // User marker (пульсирующий)
            const userIcon = L.divIcon({
                className: 'user-marker',
                html: `<div style="position:relative;width:24px;height:24px;">
                    <div style="position:absolute;top:0;left:0;width:24px;height:24px;background:#0a84ff;border:3px solid white;border-radius:50%;box-shadow:0 0 0 6px rgba(10,132,255,0.25),0 2px 8px rgba(0,0,0,0.3);z-index:2;"></div>
                    <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;background:rgba(10,132,255,0.15);border-radius:50%;animation:pulse 2s ease-out infinite;z-index:1;"></div>
                </div>`,
                iconSize: [24, 24], iconAnchor: [12, 12]
            });
            L.marker([lat, lng], { icon: userIcon }).addTo(map).bindPopup('<b>Вы здесь</b>');

            // Accuracy circle
            if (accuracy) {
                L.circle([lat, lng], { radius: accuracy, color: '#0a84ff', fillColor: '#0a84ff', fillOpacity: 0.08, weight: 1 }).addTo(map);
            }

            // Zone circles
            L.circle([lat, lng], { radius: MAX_DIST, color: '#0a84ff', fillOpacity: 0.03, weight: 1, dashArray: '6,6' }).addTo(map);
            L.circle([lat, lng], { radius: MIN_DIST, color: '#ff3b30', fillOpacity: 0.04, weight: 1, dashArray: '4,4' }).addTo(map);

            // Load or generate points
            const saved = loadPoints();
            if (saved) {
                points = saved;
                log('Loaded saved points');
            } else {
                points = generatePoints(lat, lng);
                savePoints(points);
                log('Generated new points');
            }

            // Render points
            const allMarkers = [];
            points.forEach((p, i) => {
                const icon = L.divIcon({
                    className: 'point-marker',
                    html: `<div style="width:40px;height:40px;background:#ff3b30;border:3px solid white;border-radius:50%;box-shadow:0 3px 12px rgba(255,59,48,0.4);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:16px;">${i+1}</div>`,
                    iconSize: [40, 40], iconAnchor: [20, 20]
                });
                const m = L.marker([p.lat, p.lng], { icon }).addTo(map);
                m.on('click', () => openSheet(p, i));
                markers.push(m);
                allMarkers.push(m);
            });

            // Fit bounds
            const group = L.featureGroup([...allMarkers]);
            map.fitBounds(group.getBounds().pad(0.25));

            // Show debug button
            document.getElementById('btn-debug').classList.add('visible');
        }

        // ===================== BOTTOM SHEET =====================
        function openSheet(point, index) {
            const dist = getDistance(userLoc.lat, userLoc.lng, point.lat, point.lng);
            document.getElementById('sheet-num').textContent = '#' + (index + 1);
            document.getElementById('sheet-dist').textContent = formatDist(dist);
            document.getElementById('sheet-lat').textContent = point.lat.toFixed(6);
            document.getElementById('sheet-lng').textContent = point.lng.toFixed(6);
            document.getElementById('sheet-acc').textContent = userLoc.accuracy ? '±' + Math.round(userLoc.accuracy) + ' м' : '—';
            document.getElementById('bottom-sheet').classList.add('visible');
        }

        function closeSheet() {
            document.getElementById('bottom-sheet').classList.remove('visible');
        }

        // ===================== LOCATION METHODS =====================
        async function requestTelegramLocation() {
            return new Promise((resolve, reject) => {
                if (!tg || !tg.LocationManager) {
                    reject(new Error('LocationManager not available'));
                    return;
                }
                if (tg.LocationManager.isSupported && !tg.LocationManager.isSupported()) {
                    reject(new Error('LocationManager not supported'));
                    return;
                }
                log('Using Telegram LocationManager');
                if (tg.LocationManager.requestLocation) {
                    tg.LocationManager.requestLocation((loc) => {
                        if (loc && loc.latitude !== undefined) {
                            log('Got location via requestLocation:', loc);
                            resolve({ lat: loc.latitude, lng: loc.longitude, accuracy: loc.horizontal_accuracy });
                        } else {
                            reject(new Error('Empty location from requestLocation'));
                        }
                    });
                    return;
                }
                if (tg.LocationManager.getLocation) {
                    tg.LocationManager.getLocation((loc) => {
                        if (loc && loc.latitude !== undefined) {
                            log('Got location via getLocation:', loc);
                            resolve({ lat: loc.latitude, lng: loc.longitude, accuracy: loc.horizontal_accuracy });
                        } else {
                            reject(new Error('Empty location from getLocation'));
                        }
                    });
                    return;
                }
                reject(new Error('No location method available'));
            });
        }

        function requestBrowserLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject(new Error('Browser geolocation not supported'));
                    return;
                }
                log('Using browser geolocation');
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        log('Browser location:', pos.coords);
                        resolve({
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            accuracy: pos.coords.accuracy
                        });
                    },
                    (err) => {
                        let msg = 'Не удалось получить геолокацию';
                        if (err.code === 1) msg = 'Доступ к геолокации запрещён. Разрешите доступ в настройках устройства.';
                        else if (err.code === 2) msg = 'Геолокация недоступна. Проверьте GPS.';
                        else if (err.code === 3) msg = 'Превышено время ожидания. Попробуйте снова.';
                        reject(new Error(msg));
                    },
                    { enableHighAccuracy: true, timeout: 20000, maximumAge: 0 }
                );
            });
        }

        async function getLocation() {
            const errors = [];
            if (useNativeLocation && tg && tg.LocationManager) {
                try {
                    return await requestTelegramLocation();
                } catch (e) {
                    log('Telegram location failed:', e.message);
                    errors.push('Telegram: ' + e.message);
                }
            }
            try {
                return await requestBrowserLocation();
            } catch (e) {
                log('Browser location failed:', e.message);
                errors.push('Browser: ' + e.message);
                throw new Error(errors.join(' | '));
            }
        }

        // ===================== MAIN FLOW =====================
        async function startApp() {
            setLoading('Запрашиваем геолокацию...', 'Это может занять несколько секунд');
            try {
                const loc = await getLocation();
                showScreen('screen-loading');
                setTimeout(() => {
                    initMap(loc.lat, loc.lng, loc.accuracy);
                    showScreen('screen-loading');
                    document.getElementById('screen-loading').classList.add('hidden');
                }, 300);
            } catch (e) {
                log('Location error:', e.message);
                if (e.message.includes('запрещён') || e.message.includes('permission') || e.message.includes('denied')) {
                    showScreen('screen-perm');
                } else {
                    showError('Не удалось получить геолокацию', e.message);
                }
            }
        }

        // ===================== INIT =====================
        function init() {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                log('Telegram WebApp initialized, version:', tg.version);
                log('LocationManager available:', !!tg.LocationManager);
                if (tg.LocationManager) {
                    log('LocationManager methods:', Object.keys(tg.LocationManager));
                }
            } else {
                log('Running outside Telegram');
                useNativeLocation = false;
            }

            document.getElementById('btn-request-loc').addEventListener('click', () => {
                useNativeLocation = true;
                startApp();
            });
            document.getElementById('btn-use-browser').addEventListener('click', () => {
                useNativeLocation = false;
                startApp();
            });
            document.getElementById('btn-retry').addEventListener('click', startApp);
            document.getElementById('btn-reset-points').addEventListener('click', () => {
                clearPoints();
                showError('Точки сброшены', 'При следующем запуске будут созданы новые точки. Перезапустите приложение.');
            });
            document.getElementById('sheet-close').addEventListener('click', closeSheet);
            document.getElementById('btn-debug').addEventListener('click', () => {
                clearPoints();
                location.reload();
            });
            document.getElementById('map').addEventListener('click', closeSheet);

            startApp();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
